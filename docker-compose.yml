services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmaster
    ports:
      - '5433:5432'
    volumes:
      - taskmaster_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d taskmaster']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  taskmaster_pgdata:
